services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ptf
      POSTGRES_PASSWORD: ptf
      POSTGRES_DB: ptf_engine
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptf -d ptf_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
